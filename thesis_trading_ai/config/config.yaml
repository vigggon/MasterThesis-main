# Thesis Trading AI Configuration

project:
  name: "MasterThesis_AI"

data:
  train_start: "2019-01-01"
  train_end: "2025-08-28" # Fixed: explicitly stops right before the backtest
  backtest_days: null # if set, overrides backtest_start/end with last N days
  backtest_start: "2025-08-29"
  backtest_end: "2026-02-23"
  open_start: "09:30"
  open_end: "11:30"
  ny_tz: "America/New_York"
  symbols:
    - "USTEC"
    - "NAS100"
    - "NDX100"
    - "US100"

features:
  window: 24
  atr_period: 14

trading:
  sl_atr_mult: 1.0
  tp_atr_mult: 3.0
  max_hold_candles: 12
  trade_threshold: 0.4
  num_classes: 3 # 0=hold, 1=long, 2=short
  risk_pct_per_trade: 0.005
  max_dd_cap: 0.25
  account_balance: 10000.0
  point_value_per_lot: 1.0

# Aggressive Optimization Defaults
optimization:
  daily_stop_r: -4.0
  daily_tp_r: 12.0
  min_atr: 15.0
  atr_scale_threshold: 1.3

models:
  lstm:
    hidden_size: 128
    num_layers: 1
    best_dir_name: "lstm_L1_U128"
  transformer:
    d_model: 64
    nhead: 8
    num_layers: 3
    best_dir_name: "transformer_L3_H8_D64"
